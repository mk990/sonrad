name: release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # for creating GitHub Releases
  packages: write   # for pushing to GHCR

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ----------------------------------------------------------------
  # Always: build & push multi-arch image to GHCR.
  #   push to master/main → :latest, :master, :sha-XXXXXXX
  #   tag v1.2.3           → :v1.2.3, :1.2.3, :1.2, :1, :latest
  # ----------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------
  # On tag v* only: cross-compile binaries.
  # ----------------------------------------------------------------
  binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          name="sonrad-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            binary="sonrad.exe"
          else
            binary="sonrad"
          fi
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v}" -o "$binary" sonrad.go

          if [ "$GOOS" = "windows" ]; then
            zip -j "dist/${name}.zip" "$binary" README.md
          else
            tar -czf "dist/${name}.tar.gz" "$binary" README.md
          fi
          rm -f "$binary"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------
  # On tag v* only: gather binaries, checksum, publish a Release.
  # ----------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [docker, binaries]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Container image

            ```sh
            docker pull ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            Multi-arch: `linux/amd64`, `linux/arm64`.

            ## Binaries

            Prebuilt binaries are attached below. Verify with `checksums.txt`:

            ```sh
            sha256sum -c checksums.txt
            ```
